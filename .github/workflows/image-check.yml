name: Node image build check

on:
  push:
    branches: ["**"]
    tags-ignore: ["*"]
    paths:
      - "cmd/vabbe/image/**"
      - ".github/workflows/image-check.yml"
  pull_request:
    branches: [main]
    paths:
      - "cmd/vabbe/image/**"
      - ".github/workflows/image-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-node-image:
    name: Build node image (${{ matrix.base }}, no push)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        base: [ubuntu, rocky]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: cmd/vabbe/image
          file: cmd/vabbe/image/${{ matrix.base }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ghcr.io/nutellinoit/vabbe-node:ci-${{ matrix.base }}
