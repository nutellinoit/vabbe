name: Examples

# Run each example end-to-end (vabbe + Ansible community roles) against the
# pinned, published node image (examples default VABBE_NODE_IMAGE to a release
# tag). No local image build here — that keeps these jobs off Docker Hub's
# flaky buildkit-frontend fetch; node-image source regressions are covered by
# the Integration and Node-image-build-check workflows instead. Bumping the
# pinned tag in the examples re-validates them against a new release.
# (kafka is intentionally not here — too heavy for CI.)
on:
  push:
    branches: ["**"]
    tags-ignore: ["*"]
    paths:
      - "examples/**"
      - ".github/workflows/examples.yml"
  pull_request:
    branches: [main]
    paths:
      - "examples/**"
      - ".github/workflows/examples.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  example:
    name: example (${{ matrix.example }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example: [nginx, redis, postgres]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Run example end-to-end
        working-directory: examples/${{ matrix.example }}
        run: |
          mise trust
          mise install
          mise run test
