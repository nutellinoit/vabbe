name: Branch checks

on:
  push:
    branches: ["**"]
    tags-ignore: ["*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-go-cli:
    name: Validate Go CLI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Run checks
        run: mise run ci
