name: Tagged node image publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/nutellinoit/vabbe-node

jobs:
  publish-node-image:
    name: Publish node image (${{ matrix.base }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        base: [ubuntu, rocky]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set image tags
        id: meta
        shell: bash
        env:
          BASE: ${{ matrix.base }}
        run: |
          ref_name="${GITHUB_REF_NAME}"
          short_sha="${GITHUB_SHA::7}"
          tags=()
          # Distro-prefixed tags for every base.
          tags+=("${IMAGE}:${BASE}-${ref_name}")
          tags+=("${IMAGE}:${BASE}-sha-${short_sha}")
          if [[ "${ref_name}" =~ -rc\. ]]; then
            tags+=("${IMAGE}:${BASE}-rc")
          else
            tags+=("${IMAGE}:${BASE}")
            tags+=("${IMAGE}:${BASE}-latest")
          fi
          # Ubuntu is the default base: keep the legacy unprefixed tags so existing
          # references (:rc, :24.04, :latest, :vX.Y.Z) keep resolving.
          if [[ "${BASE}" == "ubuntu" ]]; then
            tags+=("${IMAGE}:${ref_name}")
            tags+=("${IMAGE}:${ref_name#v}")
            tags+=("${IMAGE}:sha-${short_sha}")
            if [[ "${ref_name}" =~ -rc\. ]]; then
              tags+=("${IMAGE}:rc")
            else
              tags+=("${IMAGE}:24.04")
              tags+=("${IMAGE}:latest")
            fi
          fi
          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: cmd/vabbe/image
          file: cmd/vabbe/image/${{ matrix.base }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
