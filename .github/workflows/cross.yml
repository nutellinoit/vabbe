name: Cross-platform CLI build

on:
  push:
    branches: ["**"]
    tags-ignore: ["*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-cli-artifacts:
    name: Build CLI artifacts (no release)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Cross build
        run: mise run cross

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vabbe-cross-builds
          path: releases/vabbe-*
          if-no-files-found: error
