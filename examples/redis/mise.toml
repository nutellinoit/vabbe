[tools]
python = "3.12"
uv = "latest"
"github:nutellinoit/vabbe" = "0.1.3"

[env]
ANSIBLE_HOST_KEY_CHECKING = "False"
# Overridable so CI can point the lab at a locally-built node image.
VABBE_NODE_IMAGE = "{{ env.VABBE_NODE_IMAGE | default(value='ghcr.io/nutellinoit/vabbe-node:v0.1.3') }}"

[tasks.deps]
run = """
set -e
[ -d .venv ] || uv venv .venv
. .venv/bin/activate
uv pip install "ansible-core>=2.16"
ansible-galaxy install -r requirements.yml
"""

[tasks.up]
run = "vabbe up --wait"

[tasks.inventory]
run = "vabbe inventory > inventory.ini"

[tasks.converge]
run = """
set -e
. .venv/bin/activate
ansible-playbook -i inventory.ini playbook.yml
"""

# Write on the primary, read it back from a replica — proves replication.
# Retry: the initial replica sync can take a moment after `replicaof`.
[tasks.verify]
run = """
set -e
vabbe exec redis-primary -- redis-cli set vabbe-key hello >/dev/null
for i in $(seq 1 20); do
  got=$(vabbe exec redis-r1 -- redis-cli get vabbe-key | tr -d '\\r\\n')
  case "$got" in *hello*) echo "replica redis-r1 returned: $got"; exit 0;; esac
  sleep 1
done
echo "replica never received the key (last: '$got')"; exit 1
"""

[tasks.down]
run = "vabbe down || true"

[tasks.test]
run = """
set -e
for t in deps up inventory converge verify down; do
  echo "===== $t ====="
  mise run "$t"
done
echo 'all good'
"""
