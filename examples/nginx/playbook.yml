---
# Install nginx on the web node(s) with the community role. The inventory group
# is the lab name (see `vabbe inventory`).
- hosts: ex-nginx
  become: true
  pre_tasks:
    # The vabbe node image ships with no apt lists, so refresh before installing.
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        update_cache_retries: 10
        update_cache_retry_max_delay: 30
      changed_when: false
  roles:
    - geerlingguy.nginx
