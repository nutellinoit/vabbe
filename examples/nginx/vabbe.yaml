name: ex-nginx
network: { subnet: 10.150.1.0/24 }
defaults:
  image: ${VABBE_NODE_IMAGE}
  privileged: true
  # Use Docker's embedded resolver (forwards to the host's DNS) — reliable
  # everywhere incl. CI. These labs run no pods, so no public upstream is needed.
  dns: ["127.0.0.11"]
nodes:
  - { name: web, ip: 10.150.1.10 }
# To reach nginx from the host, publish a free port, e.g.:
#   - { name: web, ip: 10.150.1.10, ports: ["127.0.0.1:8080:80"] }

