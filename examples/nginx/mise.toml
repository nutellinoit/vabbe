[tools]
python = "3.12"
uv = "latest"
"github:nutellinoit/vabbe" = "0.1.3"

[env]
ANSIBLE_HOST_KEY_CHECKING = "False"
# Overridable so CI can point the lab at a locally-built node image.
VABBE_NODE_IMAGE = "{{ env.VABBE_NODE_IMAGE | default(value='ghcr.io/nutellinoit/vabbe-node:v0.1.3') }}"

# Install ansible-core (pinned python via uv) into a local venv, plus the Galaxy role.
[tasks.deps]
run = """
set -e
[ -d .venv ] || uv venv .venv
. .venv/bin/activate
uv pip install "ansible-core>=2.16"
ansible-galaxy install -r requirements.yml
"""

[tasks.up]
run = "vabbe up --wait"

[tasks.inventory]
run = "vabbe inventory > inventory.ini"

[tasks.converge]
run = """
set -e
. .venv/bin/activate
ansible-playbook -i inventory.ini playbook.yml
"""

[tasks.verify]
run = "vabbe exec web -- curl -fsS -o /dev/null -w 'HTTP %{http_code}\\n' http://localhost"

[tasks.down]
run = "vabbe down || true"

# Full loop: deps -> up -> inventory -> converge -> verify -> down.
[tasks.test]
run = """
set -e
for t in deps up inventory converge verify down; do
  echo "===== $t ====="
  mise run "$t"
done
echo 'all good'
"""
