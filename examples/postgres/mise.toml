[tools]
python = "3.12"
uv = "latest"
"github:nutellinoit/vabbe" = "0.1.3"

[env]
ANSIBLE_HOST_KEY_CHECKING = "False"
# Overridable so CI can point the lab at a locally-built node image.
VABBE_NODE_IMAGE = "ghcr.io/nutellinoit/vabbe-node:v0.1.3"

[tasks.deps]
run = """
set -e
[ -d .venv ] || uv venv .venv
. .venv/bin/activate
uv pip install "ansible-core>=2.16"
ansible-galaxy install -r requirements.yml
"""

[tasks.up]
run = "vabbe up --wait"

[tasks.inventory]
run = "vabbe inventory > inventory.ini"

[tasks.converge]
run = """
set -e
. .venv/bin/activate
ansible-playbook -i inventory.ini playbook.yml
"""

# Write on the primary, read it back from the (read-only) replica.
[tasks.verify]
run = """
set -e
vabbe exec pg-primary -- sudo -u postgres psql -tAc "create table if not exists t(x int); delete from t; insert into t values (42);" >/dev/null
for i in $(seq 1 20); do
  got=$(vabbe exec pg-replica -- sudo -u postgres psql -tAc "select x from t limit 1" 2>/dev/null | tr -d '\\r\\n ')
  [ "$got" = "42" ] && { echo "replica returned: $got"; exit 0; }
  sleep 1
done
echo "replica never received the row (last: '$got')"; exit 1
"""

[tasks.down]
run = "vabbe down || true"

[tasks.test]
run = """
set -e
for t in deps up inventory converge verify down; do
  echo "===== $t ====="
  mise run "$t"
done
echo 'all good'
"""
