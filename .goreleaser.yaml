version: 2

project_name: vabbe

before:
  hooks:
    - go mod tidy

builds:
  - id: vabbe
    main: ./cmd/vabbe
    binary: vabbe
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: vabbe
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

release:
  prerelease: auto
  mode: replace
