[tools]
go = "1.25"
golangci-lint = "latest"
goreleaser = "2.16.0"

[env]
CGO_ENABLED = "0"

[tasks.build]
run = "go build -o dist/vabbe ./cmd/vabbe"

[tasks.test]
run = "go test ./..."

[tasks.lint]
run = "golangci-lint run"

[tasks.fmt]
run = "gofmt -w ."

[tasks.fmt-check]
run = "test -z \"$(gofmt -l .)\""

[tasks.vet]
run = "go vet ./..."

[tasks.cross]
run = """
mkdir -p releases
for GOOS in darwin linux; do
  for GOARCH in amd64 arm64; do
    go build -trimpath -ldflags "-s -w" -o "releases/vabbe-${GOOS}-${GOARCH}" ./cmd/vabbe
  done
done
"""

[tasks.release]
run = "goreleaser release --clean"

[tasks.snapshot]
run = "goreleaser release --snapshot --clean"

[tasks.ci]
depends = ["fmt-check", "lint", "test", "build"]

# Docker integration test (real daemon + node image). Opt-in via VABBE_IT so it
# never runs as part of `mise run test`/`ci`. Override the image with VABBE_IT_IMAGE.
[tasks.test-it]
run = "VABBE_IT=1 go test ./cmd/vabbe -run TestIntegrationLab -v -timeout 5m"

# Same as test-it but builds the node image from this checkout first and tests
# against it — no registry needed. Mirrors the integration CI workflow. Pick the
# base with VABBE_BASE (ubuntu|rocky), default ubuntu.
[tasks.test-it-local]
run = """
base="${VABBE_BASE:-ubuntu}"
docker build -t vabbe-node:ci -f cmd/vabbe/image/$base/Dockerfile cmd/vabbe/image
VABBE_IT=1 VABBE_IT_IMAGE=vabbe-node:ci go test ./cmd/vabbe -run TestIntegrationLab -v -timeout 5m
"""

[tasks.coverage]
run = "go test -cover ./..."
