[tools]
go = "1.25"
golangci-lint = "latest"
goreleaser = "2.16.0"

[env]
CGO_ENABLED = "0"

[tasks.build]
run = "go build -o dist/vabbe ./cmd/vabbe"

[tasks.test]
run = "go test ./..."

[tasks.lint]
run = "golangci-lint run"

[tasks.fmt]
run = "gofmt -w ."

[tasks.fmt-check]
run = "test -z \"$(gofmt -l .)\""

[tasks.vet]
run = "go vet ./..."

[tasks.cross]
run = """
mkdir -p releases
for GOOS in darwin linux; do
  for GOARCH in amd64 arm64; do
    go build -trimpath -ldflags "-s -w" -o "releases/vabbe-${GOOS}-${GOARCH}" ./cmd/vabbe
  done
done
"""

[tasks.release]
run = "goreleaser release --clean"

[tasks.snapshot]
run = "goreleaser release --snapshot --clean"

[tasks.ci]
depends = ["fmt-check", "lint", "test", "build"]

[tasks.coverage]
run = "go test -cover ./..."
